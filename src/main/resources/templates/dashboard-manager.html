<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Manager - Vocea Galați</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #1f2937;

            background:
                    linear-gradient(rgba(15, 23, 42, 0.62), rgba(15, 23, 42, 0.62)),
                    url('/../images/galati.jpg');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(30, 58, 138, 0.88);
            backdrop-filter: blur(8px);
            color: white;
            padding: 18px 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 24px rgba(0,0,0,0.22);
        }

        .navbar-brand {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .navbar-brand span {
            font-weight: 300;
            opacity: 0.9;
        }

        .navbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .navbar-actions a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.16);
            padding: 9px 16px;
            border-radius: 999px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .navbar-actions a:hover,
        .navbar-brand:hover {
            background: rgba(255,255,255,0.26);
        }

        .container {
            max-width: 1200px;
            margin: 34px auto;
            background: rgba(255, 255, 255, 0.94);
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 16px 44px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(10px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f1f5f9;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-secondary {
            background: #64748b;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            width: 560px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            border-radius: 12px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 14px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-poza {
            width: 100%;
            height: 260px;
            object-fit: contain;
            object-position: center;
            border-radius: 10px;
            margin: 10px 0 15px 0;
            display: block;
            background: #f3f4f6;
        }

        .selected-list {
            margin: 10px 0;
            padding: 10px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            min-height: 45px;
        }

        .selected-item {
            display: inline-block;
            background: #dbeafe;
            color: #1e3a8a;
            padding: 6px 10px;
            border-radius: 999px;
            margin: 4px;
        }

        select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/" class="navbar-brand">
        Vocea Galați <span>Manager</span>
    </a>

    <div class="navbar-actions">
        <a href="/">Înapoi acasă</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h2>Sesizări nerepartizate</h2>

    <div th:if="${#lists.isEmpty(sesizari)}">
        <p>Nu există sesizări nerepartizate momentan.</p>
    </div>

    <table th:if="${not #lists.isEmpty(sesizari)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Titlu</th>
            <th>Descriere</th>
            <th>Data</th>
            <th>User</th>
            <th>Acțiune</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="s : ${sesizari}">
            <td th:text="${s.nrReclamatie}">1</td>
            <td th:text="${s.titlu}">Titlu</td>
            <td th:text="${s.descriere}">Descriere</td>
            <td th:text="${s.dataDepunerii}">Data</td>
            <td th:text="${s.user != null ? s.user.username : 'Guest'}">User</td>
            <td>
                <button type="button"
                        class="btn"
                        th:attr="
                            data-id=${s.nrReclamatie},
                            data-titlu=${s.titlu},
                            data-descriere=${s.descriere},
                            data-data=${s.dataDepunerii},
                            data-user=${s.user != null ? s.user.username : 'Guest'},
                            data-email=${s.user != null ? s.user.email : '-'}
                        "
                        onclick="openManagerModal(this)">
                    Vizualizează
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div id="managerModal" class="modal-overlay">
    <div class="modal">
        <button type="button" class="modal-close" onclick="closeManagerModal()">&times;</button>

        <h3>Repartizare sesizare</h3>

        <p><strong>ID:</strong> <span id="managerModalId"></span></p>
        <p><strong>Titlu:</strong> <span id="managerModalTitlu"></span></p>
        <p><strong>Descriere:</strong> <span id="managerModalDescriere"></span></p>
        <p><strong>Data:</strong> <span id="managerModalData"></span></p>
        <p><strong>User:</strong> <span id="managerModalUser"></span></p>
        <p><strong>Email:</strong> <span id="managerModalEmail"></span></p>

        <p><strong>Poza:</strong></p>
        <img id="managerModalPoza"
             src=""
             alt="Poza sesizare"
             class="modal-poza"
             onerror="this.style.display='none';">

        <hr>

        <form th:action="@{/manager/repartizeaza}" method="post" onsubmit="return pregatesteRepartizarea()">
            <input type="hidden" name="idSesizare" id="managerInputIdSesizare">

            <label>Prioritate:</label>
            <select name="prioritate" required>
                <option value="">Alege prioritatea</option>
                <option th:each="p : ${prioritati}"
                        th:value="${p}"
                        th:text="${p}">
                </option>
            </select>

            <label>Alege instituție:</label>
            <select id="managerSelectInstitutie">
                <option value="">Selectează instituția</option>
                <option th:each="inst : ${institutii}"
                        th:value="${inst.institutie_id}"
                        th:text="${inst.numeInstitutie}">
                </option>
            </select>

            <button type="button" class="btn" onclick="adaugaInstitutieSelectata()">
                Adaugă instituție
            </button>

            <div class="selected-list" id="listaInstitutiiSelectate">
                Nicio instituție selectată.
            </div>

            <div id="hiddenInstitutiiContainer"></div>

            <button type="submit" class="btn">
                Repartizează
            </button>

            <button type="button" class="btn btn-secondary" onclick="closeManagerModal()">
                Anulează
            </button>
        </form>
    </div>
</div>

<script>
    let institutiiSelectate = [];

    function openManagerModal(button) {
        const id = button.getAttribute("data-id");

        document.getElementById("managerModalId").innerText = id;
        document.getElementById("managerModalTitlu").innerText = button.getAttribute("data-titlu");
        document.getElementById("managerModalDescriere").innerText = button.getAttribute("data-descriere");
        document.getElementById("managerModalData").innerText = button.getAttribute("data-data");
        document.getElementById("managerModalUser").innerText = button.getAttribute("data-user");
        document.getElementById("managerModalEmail").innerText = button.getAttribute("data-email");

        document.getElementById("managerInputIdSesizare").value = id;

        const poza = document.getElementById("managerModalPoza");
        poza.style.display = "block";
        poza.src = "/api/sesizari/" + id + "/poza";

        institutiiSelectate = [];
        actualizeazaListaInstitutii();

        document.getElementById("managerModal").style.display = "flex";
    }

    function closeManagerModal() {
        document.getElementById("managerModal").style.display = "none";
    }

    function adaugaInstitutieSelectata() {
        const select = document.getElementById("managerSelectInstitutie");
        const id = select.value;
        const nume = select.options[select.selectedIndex].text;

        if (!id) {
            alert("Alege o instituție.");
            return;
        }

        const dejaExista = institutiiSelectate.some(inst => inst.id === id);

        if (dejaExista) {
            alert("Instituția este deja selectată.");
            return;
        }

        institutiiSelectate.push({
            id: id,
            nume: nume
        });

        actualizeazaListaInstitutii();
    }

    function stergeInstitutieSelectata(id) {
        institutiiSelectate = institutiiSelectate.filter(inst => inst.id !== id);
        actualizeazaListaInstitutii();
    }

    function actualizeazaListaInstitutii() {
        const lista = document.getElementById("listaInstitutiiSelectate");
        const hiddenContainer = document.getElementById("hiddenInstitutiiContainer");

        lista.innerHTML = "";
        hiddenContainer.innerHTML = "";

        if (institutiiSelectate.length === 0) {
            lista.innerText = "Nicio instituție selectată.";
            return;
        }

        institutiiSelectate.forEach(inst => {
            const span = document.createElement("span");
            span.className = "selected-item";
            span.innerHTML = inst.nume + " <button type='button' onclick='stergeInstitutieSelectata(\"" + inst.id + "\")'>x</button>";
            lista.appendChild(span);

            const input = document.createElement("input");
            input.type = "hidden";
            input.name = "institutieIds";
            input.value = inst.id;
            hiddenContainer.appendChild(input);
        });
    }

    function pregatesteRepartizarea() {
        if (institutiiSelectate.length === 0) {
            alert("Trebuie să alegi cel puțin o instituție.");
            return false;
        }

        return true;
    }
</script>

</body>
</html>
