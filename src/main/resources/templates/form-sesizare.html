<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trimite sesizare - Galați</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
</head>
<body class="galati-page">

<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Sesizări Galați</a>
        <a class="btn btn-back" href="/">Înapoi acasă</a>
    </div>
</nav>

<main class="hero-form py-5">
    <div class="container">
        <div class="row g-4 align-items-stretch">
            <div class="col-lg-7">
                <div class="form-shell h-100">
                    <div class="text-center mb-4">
                        <span class="form-kicker">Platformă civică locală</span>
                        <h1 class="form-title">Trimite o sesizare</h1>
                    </div>

                    <form id="sesizareForm">
                        <div class="mb-4">
                            <label for="titlu" class="form-label custom-label">Titlu sesizare</label>
                            <input type="text" class="form-control custom-input" id="titlu" placeholder="Ex. Groapă pe carosabil">
                        </div>
                        <div class="mb-4">
                            <label for="descriere" class="form-label custom-label">Descriere</label>
                            <textarea class="form-control custom-input" id="descriere" rows="5"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4"><label for="strada" class="form-label custom-label">Stradă</label><input type="text" class="form-control custom-input" id="strada"></div>
                            <div class="col-md-3 mb-4"><label for="numar" class="form-label custom-label">Număr</label><input type="text" class="form-control custom-input" id="numar"></div>
                            <div class="col-md-3 mb-4"><label for="zona" class="form-label custom-label">Zonă</label><input type="text" class="form-control custom-input" id="zona"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="prioritate" class="form-label custom-label">Prioritate</label>
                                <select class="form-select custom-input" id="prioritate">
                                    <option value="SCAZUTA">Scăzută</option>
                                    <option value="MEDIE" selected>Medie</option>
                                    <option value="INALTA">Ridicată</option>
                                    <option value="URGENTA">Urgentă</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="institutie" class="form-label custom-label">Instituție responsabilă</label>
                                <select class="form-select custom-input" id="institutie">
                                    <option value="" selected disabled>Alege instituția</option>
                                    <option th:each="inst : ${institutii}"
                                            th:value="${inst.numeInstitutie}"
                                            th:text="${inst.numeInstitutie}"></option>
                                </select>
                            </div>
                        </div>

                        <input type="hidden" id="latitudine"><input type="hidden" id="longitudine">
                        <div class="text-center pt-2"><button type="button" onclick="trimiteSesizare()" class="submit-btn px-5">Trimite sesizarea</button></div>
                    </form>

                    <div id="successAnim" class="text-center mt-4" style="display:none;">
                        <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_jbrw3hcz.json" background="transparent" speed="1" style="width: 220px; height: 220px; margin:auto;" autoplay></lottie-player>
                        <h4 class="mt-2 success-title">Sesizarea a fost trimisă</h4>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="form-shell h-100"><div id="map" class="rounded-4 flex-grow-1" style="min-height: 520px;"></div></div>
            </div>
        </div>
    </div>
</main>

<div id="boatContainer" class="boat-container">
    <svg fill="#5a4e3c" viewBox="0 0 519 519" style="width: 100px; height: 100px;">

    </svg>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZ2l1bGlhMTAxMTEiLCJhIjoiY21uNmh0b3F3MDVrdDJycGRtdGJmNmxybCJ9.sl_motBiHwZYyZiOTv5SHQ';
    const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/standard', center: [28.04, 45.43], zoom: 12 });
    let marker = null;

    map.on('click', async (e) => {
        const { lng, lat } = e.lngLat;
        document.getElementById("latitudine").value = lat;
        document.getElementById("longitudine").value = lng;
        if (marker) marker.remove();
        marker = new mapboxgl.Marker({ color: "#b8946b" }).setLngLat([lng, lat]).addTo(map);

        try {
            const response = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${mapboxgl.accessToken}&language=ro`);
            const data = await response.json();
            if (data.features.length > 0) {
                const feat = data.features[0];
                document.getElementById("strada").value = feat.text || "";
                document.getElementById("numar").value = feat.address || "";
                // LOGICA DE GALAȚI
                let cartier = feat.context?.find(c => c.id.includes('neighborhood'))?.text;
                document.getElementById("zona").value = cartier ? cartier : "Galați";
            }
        } catch (err) { console.error(err); }
    });

            institutie: {
                institutie_id: parseInt(institutieId)
            },
            adresa: {
                nume: document.getElementById("strada").value,
                numar: document.getElementById("numar").value,
                zona: document.getElementById("zona").value,
                latitudine: parseFloat(document.getElementById("latitudine").value || "0"),
                longitudine: parseFloat(document.getElementById("longitudine").value || "0")
            }
        };

</script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</body>
</html>
