<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Harta sesizărilor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

    <style>
        body {
            background: #f7f2ea;
        }

        .map-container {
            max-width: 1100px;
            margin: 40px auto;
            background: #fffaf4;
            border-radius: 24px;
            border: 1px solid #e7dfd3;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .map-header {
            padding: 25px;
            border-bottom: 1px solid #e7dfd3;
        }

        .map-title {
            font-size: 1.8rem;
            color: #4a4033;
            margin: 0;
        }

        .map-subtitle {
            color: #7a6f60;
            margin-top: 5px;
        }

        #map {
            width: 100%;
            height: 500px;
        }

        .back-btn {
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
            color: #5a4e3c;
            border: 1px solid #cfc5b6;
            padding: 8px 16px;
            border-radius: 10px;
        }

        .back-btn:hover {
            background: #f3ece3;
        }
    </style>
</head>

<body>

<div class="filter-bar p-3 bg-white border-bottom d-flex flex-wrap gap-3 align-items-end">
    <div class="filter-group">
        <label class="small fw-bold text-muted">Status</label>
        <select id="filterStatus" class="form-select shadow-sm">
            <option value="TOATE">Toate Statusurile</option>
            <option value="NOU">🆕 Nou</option>
            <option value="IN_ANALIZA">🔍 În analiză</option>
            <option value="IN_LUCRU">🛠️ În lucru</option>
            <option value="REZOLVAT">✅ Rezolvat</option>
            <option value="RESPINS">❌ Respins</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="small fw-bold text-muted">Prioritate</label>
        <select id="filterPrioritate" class="form-select shadow-sm">
            <option value="TOATE">Toate Prioritățile</option>
            <option value="URGENTA">🔴 Urgentă</option>
            <option value="INALTA">🟠 Înaltă</option>
            <option value="MEDIE">🟡 Medie</option>
            <option value="SCAZUTA">🟢 Scăzută</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="small fw-bold text-muted">Data postării</label>
        <input type="date" id="filterData" class="form-control shadow-sm">
    </div>

    <button onclick="resetFiltre()" class="btn btn-outline-secondary shadow-sm">Resetează</button>

    <div class="ms-auto pb-2 text-muted small">
        Rezultate: <b id="counter">0</b>
    </div>
</div>
<div class="map-container">

    <div class="map-header">
        <h2 class="map-title">Harta sesizărilor</h2>
        <p class="map-subtitle">Vizualizare în timp real a problemelor din Galați</p>

        <a href="/" class="back-btn">← Înapoi</a>
    </div>

    <div id="map"></div>

</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZ2l1bGlhMTAxMTEiLCJhIjoiY21uNmh0b3F3MDVrdDJycGRtdGJmNmxybCJ9.sl_motBiHwZYyZiOTv5SHQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/standard', // stil neutru
        center: [28.04, 45.43], // Galați
        zoom: 12
    });

    map.addControl(new mapboxgl.NavigationControl());
    // Funcție pentru a încărca sesizările din baza de date
    async function incarcaSesizari() {
        try {
            // 1. Aici DEFINIM variabila 'response' prin fetch
            const response = await fetch('/api/sesizari/toate');

            // 2. Verificăm dacă serverul a răspuns cu succes
            if (!response.ok) {
                console.error("Serverul a dat eroare:", response.status);
                return;
            }

            // 3. Acum putem folosi 'response' pentru a lua JSON-ul
            const sesizariDB = await response.json();
            console.log("Date primite:", sesizariDB);

            sesizariDB.forEach(s => {
                // 1. Extragere coordonate
                const lat = s.latitudine || (s.adresa ? s.adresa.latitudine : null);
                const lng = s.longitudine || (s.adresa ? s.adresa.longitudine : null);

                if (lat && lng) {
                    // 2. Determinare culoare bazată pe STATUS (cum am vorbit ultima dată)// Gri default
                    let culoarePin = "#b8946b"; // Culoare implicită (Bej)

                    if (s.prioritate === 'URGENTA') {
                        culoarePin = "#d9534f"; // Roșu intens
                    } else if (s.prioritate === 'INALTA') {
                        culoarePin = "#f0ad4e"; // Portocaliu
                    } else if (s.prioritate === 'MEDIE') {
                        culoarePin = "#5bc0de"; // Albastru deschis
                    } else if (s.prioritate === 'SCAZUTA') {
                        culoarePin = "#5cb85c"; // Verde
                    }
                    // Folosim toUpperCase() ca să nu conteze dacă în DB e "Nou" sau "NOU"
                    const prioritate = s.prioritate ? s.prioritate.toUpperCase() : "";



                    // 3. Conținut Popup
                    const popupContent = `
<div style="padding: 10px; font-family: sans-serif; min-width: 180px; position: relative;">
    <div style="position: absolute; top: 5px; right: 5px; font-size: 10px; color: #999;">
        📅 ${s.dataDepunerii || 'Data necunoscută'}
    </div>

    <h3 style="margin: 0 0 5px 0; color: #4a4033; font-size: 16px; padding-right: 50px;">${s.titlu}</h3>
    <p style="margin: 0 0 10px 0; font-size: 13px; color: #666;">${s.descriere || 'Fără descriere'}</p>

    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
        <span style="background: ${culoarePin}; color: white;
                     padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;">
            ⚠️ Prioritate: ${s.prioritate || 'Standard'}
        </span>

        <span style="font-size: 11px; color: #7a6f60; align-self: center;">
            | Status: ${s.status || 'Trimisă'}
        </span>
    </div>
</div>
`;

                    // 4. Creare Marker - AICI ERA PROBLEMA (trebuie să punem variabila culoarePin)
                    new mapboxgl.Marker({ color: culoarePin }) // <--- Am pus variabila aici!
                        .setLngLat([parseFloat(lng), parseFloat(lat)])
                        .setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(popupContent))
                        .addTo(map);
                }
            });

        } catch (error) {
            console.error("Eroare la fetch:", error);
        }
    }

    incarcaSesizari();
    let markeriActivi = [];
    let toateSesizarile = [];

    async function incarcaSesizari() {
        try {
            const response = await fetch('/api/sesizari/toate');
            toateSesizarile = await response.json();

            // Ascultăm schimbările pe toate cele 3 input-uri
            document.getElementById('filterStatus').addEventListener('change', aplicaFiltre);
            document.getElementById('filterPrioritate').addEventListener('change', aplicaFiltre);
            document.getElementById('filterData').addEventListener('change', aplicaFiltre);

            aplicaFiltre(); // Afișăm totul la început
        } catch (e) { console.error("Eroare:", e); }
    }

    function aplicaFiltre() {
        // 1. Luăm valorile selectate
        const statusFiltru = document.getElementById('filterStatus').value;
        const prioritateFiltru = document.getElementById('filterPrioritate').value;
        const dataFiltru = document.getElementById('filterData').value;

        // 2. Curățăm harta
        markeriActivi.forEach(m => m.remove());
        markeriActivi = [];

        // 3. Filtrăm lista mare
        const rezultate = toateSesizarile.filter(s => {
            const matchStatus = (statusFiltru === 'TOATE' || s.status === statusFiltru);
            const matchPrioritate = (prioritateFiltru === 'TOATE' || s.prioritate === prioritateFiltru);

            // Verificăm data (tăiem doar partea de an-lună-zi din s.dataDepunerii)
            let matchData = true;
            if (dataFiltru) {
                const dataSesizare = s.dataDepunerii.split('T')[0]; // Presupunem format ISO de la server
                matchData = (dataSesizare === dataFiltru);
            }

            return matchStatus && matchPrioritate && matchData;
        });

        // 4. Actualizăm contorul și punem markerii
        document.getElementById('counter').innerText = rezultate.length;
        rezultate.forEach(s => adaugaMarkerPeHarta(s));
    }

    function adaugaMarkerPeHarta(s) {
        const lat = s.latitudine || (s.adresa ? s.adresa.latitudine : null);
        const lng = s.longitudine || (s.adresa ? s.adresa.longitudine : null);

        if (lat && lng) {
            // Logica ta de culori (bazată pe prioritate sau status)
            let culoare = (s.prioritate === 'URGENTA') ? "#d9534f" : "#b8946b";

            const m = new mapboxgl.Marker({ color: culoare })
                .setLngLat([parseFloat(lng), parseFloat(lat)])
                .setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(`
                <div style="padding:5px;">
                    <b>${s.titlu}</b><br>
                    <small>📅 ${s.dataDepunerii.split('T')[0]}</small><br>
                    <span class="badge bg-secondary">${s.status}</span>
                </div>
            `))
                .addTo(map);
            markeriActivi.push(m);
        }
    }

    function resetFiltre() {
        document.getElementById('filterStatus').value = 'TOATE';
        document.getElementById('filterPrioritate').value = 'TOATE';
        document.getElementById('filterData').value = '';
        aplicaFiltre();
    }

    incarcaSesizari();
</script>

</body>
</html>
