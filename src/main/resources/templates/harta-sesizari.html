<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Harta sesizărilor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

    <style>
        body {
            background: #f7f2ea;
        }

        .map-container {
            max-width: 1100px;
            margin: 40px auto;
            background: #fffaf4;
            border-radius: 24px;
            border: 1px solid #e7dfd3;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .map-header {
            padding: 25px;
            border-bottom: 1px solid #e7dfd3;
        }

        .map-title {
            font-size: 1.8rem;
            color: #4a4033;
            margin: 0;
        }

        .map-subtitle {
            color: #7a6f60;
            margin-top: 5px;
        }

        #map {
            width: 100%;
            height: 500px;
        }

        .back-btn {
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
            color: #5a4e3c;
            border: 1px solid #cfc5b6;
            padding: 8px 16px;
            border-radius: 10px;
        }

        .back-btn:hover {
            background: #f3ece3;
        }
    </style>
</head>

<body>

<div class="map-container">

    <div class="map-header">
        <h2 class="map-title">Harta sesizărilor</h2>
        <p class="map-subtitle">Vizualizare în timp real a problemelor din Galați</p>

        <a href="/" class="back-btn">← Înapoi</a>
    </div>

    <div id="map"></div>

</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZ2l1bGlhMTAxMTEiLCJhIjoiY21uNmh0b3F3MDVrdDJycGRtdGJmNmxybCJ9.sl_motBiHwZYyZiOTv5SHQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/standard', // stil neutru
        center: [28.04, 45.43], // Galați
        zoom: 12
    });

    map.addControl(new mapboxgl.NavigationControl());
    // Funcție pentru a încărca sesizările din baza de date
    async function incarcaSesizari() {
        try {
            // 1. Aici DEFINIM variabila 'response' prin fetch
            const response = await fetch('/api/sesizari/toate');

            // 2. Verificăm dacă serverul a răspuns cu succes
            if (!response.ok) {
                console.error("Serverul a dat eroare:", response.status);
                return;
            }

            // 3. Acum putem folosi 'response' pentru a lua JSON-ul
            const sesizariDB = await response.json();
            console.log("Date primite:", sesizariDB);

            sesizariDB.forEach(s => {
                // Verificăm dacă avem coordonate (fie direct, fie în obiectul adresa)
                const lat = s.latitudine || (s.adresa ? s.adresa.latitudine : null);
                const lng = s.longitudine || (s.adresa ? s.adresa.longitudine : null);
                let culoarePin = "#b8946b"; // Culoare implicită (Bej)
                NOU,
                    IN_LUCRU,
                    RESPINS,
                    REZOLVAT,
                    IN_ANALIZA
                if (s.prioritate === 'URGENTA') {
                    culoarePin = "#d9534f"; // Roșu intens
                } else if (s.prioritate === 'INALTA') {
                    culoarePin = "#f0ad4e"; // Portocaliu
                } else if (s.prioritate === 'MEDIE') {
                    culoarePin = "#5bc0de"; // Albastru deschis
                } else if (s.prioritate === 'SCAZUTA') {
                    culoarePin = "#5cb85c"; // Verde
                }
                if (lat && lng) {
                    // Creăm un conținut HTML mai bogat pentru Popup
                    const popupContent = `
        <div style="padding: 10px; font-family: sans-serif;">
            <h3 style="margin: 0 0 5px 0; color: #4a4033; font-size: 16px;">${s.titlu}</h3>
            <p style="margin: 0 0 10px 0; font-size: 13px; color: #666;">${s.descriere || 'Fără descriere'}</p>

            <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                <span style="background: #e7dfd3; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">
                    📍 ${s.adresa ? s.adresa.zona : 'Galați'}
                </span>
                <span style="background: ${s.prioritate === 'URGENTA' ? '#ffdfdf' : '#f0f0f0'};
                             color: ${s.prioritate === 'URGENTA' ? '#c00' : '#333'};
                             padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">
                    ⚠️ ${s.prioritate || 'Normală'}
                </span>
                <span style="background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">
                    ⚙️ ${s.status || 'Trimisă'}
                </span>
            </div>
        </div>
    `;

                    new mapboxgl.Marker({ color: "#b8946b" })
                        .setLngLat([parseFloat(lng), parseFloat(lat)])
                        .setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(popupContent))
                        .addTo(map);
                }
            });

        } catch (error) {
            console.error("Eroare la fetch:", error);
        }
    }

    incarcaSesizari();

</script>

</body>
</html>
