<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sesizări Galați</title>

    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Roboto+Slab:wght@400;700;800&display=swap" rel="stylesheet">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/accesibility.css}">



    <style>
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('/images/galati.jpg') no-repeat center center/cover;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .custom-nav { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
        .card { border: none; border-radius: 15px; transition: 0.3s; }

        /* 2. CORECTAT 'shadow' în 'box-shadow' */
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div th:replace="~{accesibilitate :: buton-accesibilitate}"></div>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center brand-container" href="/">
            <img th:src="@{/images/logo-gl.png}"
                 alt="Logo"
                 width="60"
                 height="40"
                 class="d-inline-block align-top me-3 bg-white p-1 rounded">
            Vocea Galați
        </a>
        <div class="ms-auto d-flex align-items-center">

            <div th:if="${session.utilizatorLogat == null}">
                <a href="/login" class="btn submit-btn btn-sm rounded-pill px-3 ms-2">Autentificare</a>
                <a href="/register" class="btn btn-outline-light btn-sm rounded-pill px-3 ms-2">Cont Nou</a>
            </div>

            <div th:if="${session.utilizatorLogat != null}" class="d-flex align-items-center">
                <span class="text-white me-3">
                    Salut, <b th:text="${session.utilizatorLogat.prenume}">Utilizator</b>!
                </span>
                <a href="/logout" class="btn btn-danger btn-sm rounded-pill px-3">Delogare</a>
            </div>

        </div>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1 class="display-3 fw-bold">Vocea<br>Galați</h1>
        <p class="lead">Implică-te în modernizarea orașului tău!</p>

        <a th:href="${session.utilizatorLogat != null ? '/sesizare/noua' : '/login'}"
           class="btn submit-btn btn-lg px-5 py-3 mt-3 shadow">Trimite o sesizare</a>

        <div class="mt-4">
            <p class="text-white fw-bold mb-2" style="font-size: 1.2rem;">
                Verifică harta pentru a vedea dacă problema nu a fost deja sesizată
            </p>
            <a href="/harta-sesizarilor" class="btn btn-outline-light btn-lg px-4 py-2">Harta Sesizărilor</a>
        </div>
    </div>
</section>

<footer class="bg-dark text-white text-center py-4">
    <small>© 2026 Primăria Municipiului Galați</small>
</footer>

<script th:src="@{/js/accessibility.js}"></script>
</body>
</html>
