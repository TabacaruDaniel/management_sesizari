<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panou Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* Preluăm fundalul exact ca în pagina Trimite sesizare */
        body.galati-page {
            background-image: url('/images/galati.jpg'); /* poza ta din /static/images */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Main semi-transparent ca tabelul să fie vizibil */
        main.hero-form {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            padding: 30px;
            margin: 20px auto;
            max-width: 1200px;
        }

        .custom-navbar {
            background-color: rgba(0, 0, 0, 0.7);
        }

        table {
            background-color: white;
        }
    </style>
</head>
<body class="galati-page">

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Sesizări Galați</a>
        <a class="btn btn-outline-light btn-back" href="/">Înapoi acasă</a>
    </div>
</nav>

<main class="hero-form py-5">
    <div class="text-center mb-5">
        <h1>Panou de administrare</h1>
        <p class="text-muted">Aici poți vedea și gestiona toate sesizările trimise de utilizatori.</p>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Utilizator</th>
                <th>Titlu</th>
                <th>Descriere</th>
                <th>Adresă</th>
                <th>Prioritate</th>
                <th>Instituție</th>
                <th>Status</th>
                <th>Acțiuni</th>
            </tr>
            </thead>
            <tbody id="sesizariTable">
            <!-- date populate prin JS sau Thymeleaf -->
            </tbody>
        </table>
    </div>
</main>

<script>
    // Exemplu demo JS pentru populare tabel
    const sesizari = [
        {id:1, user:"IonPopescu", titlu:"Groapă", descriere:"Groapă mare în centru", adresa:"Str. Brăilei 10", prioritate:"Ridicată", institutie:"Serviciul Drumuri", status:"Neprocesată"},
        {id:2, user:"MariaIonescu", titlu:"Strada murdară", descriere:"Gunoi pe trotuar", adresa:"Str. Domnească", prioritate:"Medie", institutie:"Serviciul Salubritate", status:"În procesare"}
    ];

    const tableBody = document.getElementById("sesizariTable");
    sesizari.forEach(s => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${s.id}</td>
            <td>${s.user}</td>
            <td>${s.titlu}</td>
            <td>${s.descriere}</td>
            <td>${s.adresa}</td>
            <td>${s.prioritate}</td>
            <td>${s.institutie}</td>
            <td>${s.status}</td>
            <td>
                <button class="btn btn-success btn-sm me-2">Aprobă</button>
                <button class="btn btn-danger btn-sm">Șterge</button>
            </td>
        `;
        tableBody.appendChild(row);
    });
</script>

</body>
</html>
