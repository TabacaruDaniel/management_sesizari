<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - Galați</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/accesibility.css}">
    <style>
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('/images/galati.jpg') no-repeat center center/cover;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .custom-nav { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
        .card { border: none; border-radius: 15px; transition: 0.3s; }

        /* 2. CORECTAT 'shadow' în 'box-shadow' */
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="galati-page">

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center brand-container" href="/">
            <img th:src="@{/images/logo-gl.png}"
                 alt="Logo"
                 width="60"
                 height="40"
                 class="d-inline-block align-top me-3 bg-white p-1 rounded">
            Vocea Galați
        </a>
        <a class="btn btn-outline-light btn-back" href="/">← Înapoi</a>
    </div>
</nav>
<script th:src="@{/js/accessibility.js}"></script>
<div th:replace="~{accesibilitate :: buton-accesibilitate}"></div>
<main class="hero-form d-flex align-items-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-6 col-lg-8">

                <div class="form-shell">
                    <div class="text-center mb-4">
                        <h1 class="form-title">Crează-ți Cont</h1>
                    </div>

                    <form th:action="@{/register}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label custom-label">Nume</label>
                                <input type="text" name="nume" class="form-control custom-input" placeholder="Ex: Popescu" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label custom-label">Prenume</label>
                                <input type="text" name="prenume" class="form-control custom-input" placeholder="Ex: Ion" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label custom-label">Email</label>
                            <input type="email" name="email" class="form-control custom-input" placeholder="contact@exemplu.ro" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label custom-label">Nume utilizator (Username)</label>
                            <input type="text" name="username" class="form-control custom-input" placeholder="Utilizator123" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label custom-label">Parolă</label>
                            <input type="password" name="password" class="form-control custom-input" placeholder="••••••••" required>
                        </div>

                        <div class="text-center pt-2">
                            <button type="submit" class="btn submit-btn w-100 py-2">Înregistrează-te</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="form-hint">Ai deja cont? <a href="/login" class="text-black fw-bold">Autentifică-te</a></p>
                    </div>
                </div>

                <div th:if="${error}" class="position-fixed top-0 start-50 translate-middle-x mt-3 shadow-lg" style="z-index: 1060; width: 90%; max-width: 400px;">
                    <div class="p-3 bg-white border border-danger rounded text-center">
                        <p class="text-danger mb-2 fw-bold" th:text="${error}"></p>
                        <a href="/login" class="btn btn-outline-danger btn-sm">Autentifică-te</a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>
</body>
</html>
</div>
</html>
